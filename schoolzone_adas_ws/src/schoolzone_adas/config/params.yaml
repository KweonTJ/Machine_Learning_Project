pedestrian_detector_node:
  ros__parameters:
    image_topic: /camera/color/image_raw
    bbox_topic: /adas/person_bbox
    annotated_image_topic: /adas/detection_image
    yolo_model_path: ""
    confidence_threshold: 0.35
    publish_empty_detections: true

pointcloud_feature_node:
  ros__parameters:
    bbox_topic: /adas/person_bbox
    depth_topic: /camera/depth/image_raw
    camera_info_topic: /camera/color/camera_info
    features_topic: /adas/features
    min_depth_m: 0.2
    max_depth_m: 8.0
    corridor_half_width_m: 0.6
    corridor_near_m: 0.6
    corridor_far_m: 4.0
    bbox_timeout_s: 0.5

risk_classifier_node:
  ros__parameters:
    features_topic: /adas/features
    risk_state_topic: /adas/risk_state
    model_path: ""
    brake_ttc_s: 1.2
    warning_ttc_s: 2.5
    brake_distance_m: 1.2
    warning_distance_m: 2.5
    caution_distance_m: 4.0

adas_dashboard_node:
  ros__parameters:
    image_topic: /camera/color/image_raw
    bbox_topic: /adas/person_bbox
    features_topic: /adas/features
    risk_state_topic: /adas/risk_state
    dashboard_image_topic: /adas/dashboard_image
    show_window: false

data_logger_node:
  ros__parameters:
    features_topic: /adas/features
    risk_state_topic: /adas/risk_state
    output_csv: data/features.csv
